<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>WorldGuessr Dev</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
  }
  .card { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 14px; margin: 0 0 24px; }
  label { display: block; font-size: 11px; color: #888; margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.6px; }
  input[type=url], input[type=text] {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    outline: none;
    -webkit-appearance: none;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  input:focus { border-color: #4a4a4a; }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    background: #2563eb;
    color: #fff;
    border: 0;
    border-radius: 8px;
    margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: #1d4ed8; }
  button.secondary { background: transparent; color: #aaa; font-weight: 500; }
  button.secondary:active { color: #fff; }
  .hint { font-size: 12px; color: #666; margin-top: 14px; text-align: center; min-height: 14px; }
  .err { color: #f87171; }
  .footer { font-size: 11px; color: #555; text-align: center; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <h1>WorldGuessr Dev</h1>
  <p class="sub">Enter your dev server URL. The app restarts and loads it directly with HMR.</p>

  <label for="url">Dev server URL</label>
  <input id="url" type="url" placeholder="http://192.168.1.42:3000" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button id="save">Save &amp; Restart</button>
  <button class="secondary" id="forget" hidden>Forget saved URL</button>
  <div class="hint" id="hint"></div>

  <div class="footer">URL is stored natively. Shake the phone later to reset it and return to this shell.</div>
</div>

<script>
(function () {
  var saveBtn = document.getElementById("save");
  var forgetBtn = document.getElementById("forget");
  var urlInput = document.getElementById("url");
  var hint = document.getElementById("hint");

  function plugin() {
    return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.WGDevShell) || null;
  }

  function notInCapacitor() {
    hint.className = "hint err";
    hint.textContent = "WGDevShell plugin not found. Open this in the Capacitor app, not a browser.";
  }

  async function init() {
    var p = plugin();
    if (!p) { notInCapacitor(); return; }
    try {
      var current = await p.getUrl();
      if (current && current.url) {
        urlInput.value = current.url;
        forgetBtn.hidden = false;
      }
    } catch (e) {}
  }

  async function save() {
    var p = plugin();
    if (!p) { notInCapacitor(); return; }
    var v = urlInput.value.trim();
    if (!v) { hint.className = "hint err"; hint.textContent = "Enter a URL."; return; }
    if (!/^https?:\/\//i.test(v)) v = "http://" + v;
    try {
      var parsed = new URL(v);
      if (parsed.protocol !== "http:" && parsed.protocol !== "https:") throw new Error("bad protocol");
      v = parsed.href.replace(/\/$/, "");
    } catch (e) {
      hint.className = "hint err";
      hint.textContent = "Enter a valid http:// or https:// URL.";
      return;
    }
    saveBtn.disabled = true;
    hint.className = "hint";
    hint.textContent = "Saving and restarting…";
    try {
      await p.setUrlAndRestart({ url: v });
    } catch (e) {
      saveBtn.disabled = false;
      hint.className = "hint err";
      hint.textContent = "Failed: " + (e && e.message ? e.message : e);
    }
  }

  async function forget() {
    var p = plugin();
    if (!p) { notInCapacitor(); return; }
    forgetBtn.disabled = true;
    hint.className = "hint";
    hint.textContent = "Clearing and restarting…";
    try {
      await p.clearUrl();
    } catch (e) {
      forgetBtn.disabled = false;
      hint.className = "hint err";
      hint.textContent = "Failed: " + (e && e.message ? e.message : e);
    }
  }

  saveBtn.addEventListener("click", save);
  forgetBtn.addEventListener("click", forget);
  urlInput.addEventListener("keydown", function (e) { if (e.key === "Enter") save(); });

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();
</script>
</body>
</html>
